<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boxly">
<title>Boxly</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0c0c0c; --surface: #161616; --surface2: #1e1e1e; --border: #242424;
    --text: #f0ede8; --muted: #555; --accent: #d4b896;
    --danger: #c0504d; --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { width: 100%; overflow-x: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overscroll-behavior: none; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  .header { display: flex; align-items: center; padding: calc(var(--safe-top) + 14px) 20px 14px; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; gap: 12px; min-height: 56px; }
  .header-title { flex: 1; font-size: 16px; font-weight: 600; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .icon-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; }
  .icon-btn:active { background: var(--surface); }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; flex-shrink: 0; }
  .sync-dot.syncing { background: #f0a500; animation: pulse 1s infinite; }
  .sync-dot.synced { background: #4caf50; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .page { display: none; flex: 1; padding: 20px 20px calc(var(--safe-bottom) + 32px); flex-direction: column; gap: 16px; overflow-y: auto; overflow-x: hidden; }
  .page.active { display: flex; }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stat-num { font-size: 32px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }

  .box-list { display: flex; flex-direction: column; gap: 8px; }
  .box-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; width: 100%; text-align: left; color: var(--text); cursor: pointer; }
  .box-card:active { opacity: 0.8; }
  .box-card-main { display: flex; align-items: center; gap: 14px; padding: 14px 16px; }
  .box-num { font-size: 12px; font-weight: 700; color: var(--accent); min-width: 42px; }
  .box-label-text { flex: 1; font-size: 15px; font-weight: 500; }
  .box-meta { font-size: 12px; color: var(--muted); }
  .chevron { color: var(--muted); font-size: 14px; }
  .box-photo-strip { display: flex; gap: 6px; padding: 0 16px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .box-photo-strip img { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; cursor: pointer; }

  .btn-primary { width: 100%; padding: 15px; background: var(--accent); color: #0c0c0c; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; }
  .btn-secondary { width: 100%; padding: 13px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-secondary:active { background: var(--surface2); }
  .btn-danger { width: 100%; padding: 13px; background: none; border: 1px solid #2a1a1a; border-radius: var(--radius); color: var(--danger); font-size: 14px; cursor: pointer; }

  .btn-ai { width: 100%; padding: 13px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%); color: #a78bfa; border: 1px solid #3730a3; border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-ai:active { opacity: 0.8; }
  .btn-ai:disabled { opacity: 0.4; }
  .ai-spinner { width: 16px; height: 16px; border: 2px solid #3730a3; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #ai-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500; align-items: flex-end; justify-content: center; }
  #ai-overlay.open { display: flex; }
  .ai-sheet { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; max-height: 80vh; display: flex; flex-direction: column; padding-bottom: calc(var(--safe-bottom) + 16px); }
  .ai-sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .ai-sheet-header { padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .ai-sheet-title { font-size: 15px; font-weight: 700; color: var(--accent); }
  .ai-sheet-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
  .ai-sheet-body { flex: 1; overflow-y: auto; padding: 14px 20px; display: flex; flex-direction: column; gap: 8px; }
  .ai-item-row { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; cursor: pointer; }
  .ai-check { width: 20px; height: 20px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .ai-check.checked { background: var(--accent); border-color: var(--accent); color: #0c0c0c; }
  .ai-item-name { flex: 1; font-size: 14px; line-height: 1.3; }
  .ai-sheet-footer { padding: 12px 20px 0; display: flex; gap: 8px; }

  .input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; font-size: 16px; color: var(--text); width: 100%; outline: none; -webkit-appearance: none; font-family: inherit; }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--muted); }
  .input-row { display: flex; gap: 8px; }
  .input-row .input { flex: 1; }
  textarea.input { resize: none; min-height: 80px; line-height: 1.5; }

  .photo-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
  .photo-section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .photo-grid { display: flex; gap: 8px; flex-wrap: wrap; }
  .photo-wrap { position: relative; }
  .photo-wrap img { border-radius: 8px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; display: block; }
  .photo-wrap .del-dot { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--danger); border: 2px solid var(--bg); color: #fff; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; }
  .photo-sm img { width: 64px; height: 64px; }
  .photo-md img { width: 80px; height: 80px; }
  .photo-btns { display: flex; gap: 8px; }
  .btn-photo { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; font-size: 13px; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .btn-photo:active { opacity: 0.7; }
  .photo-input-hidden { display: none; }

  .group-list { display: flex; flex-direction: column; gap: 8px; }
  .group-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .group-card-header { display: flex; align-items: center; gap: 10px; padding: 13px 14px; cursor: pointer; }
  .group-card-header:active { background: var(--surface2); }
  .group-card-name { flex: 1; font-size: 15px; font-weight: 500; min-width: 0; }
  .group-card-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .group-card-thumb { width: 40px; height: 40px; border-radius: 7px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .group-del-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; }
  .group-del-btn:active { color: var(--danger); }

  .field-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

  .subitem-list { display: flex; flex-direction: column; gap: 8px; }
  .subitem-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .subitem-header { display: flex; align-items: center; gap: 10px; padding: 11px 12px; }
  .subitem-name { flex: 1; font-size: 14px; font-weight: 500; }
  .subitem-photo-count { font-size: 12px; color: var(--muted); }
  .subitem-expand-btn { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 2px 6px; }
  .subitem-del-btn { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 2px 6px; }
  .subitem-del-btn:active { color: var(--danger); }
  .subitem-body { border-top: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .subitem-body.hidden { display: none; }
  .subitem-photos { display: flex; gap: 6px; flex-wrap: wrap; }
  .subitem-photo-wrap { position: relative; }
  .subitem-photo-wrap img { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; display: block; }
  .subitem-photo-wrap .del-dot { position: absolute; top: -5px; right: -5px; width: 18px; height: 18px; border-radius: 50%; background: var(--danger); border: 2px solid var(--bg); color: #fff; font-size: 9px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .subitem-add-photo-btns { display: flex; gap: 6px; }
  .btn-photo-sm { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; font-size: 12px; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 4px; }

  .section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 32px 0; }
  .hint { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .divider { height: 1px; background: var(--border); }
  .save-bar { position: sticky; bottom: 0; background: var(--bg); padding: 12px 0 0; border-top: 1px solid var(--border); }

  .search-result { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; text-align: left; color: var(--text); width: 100%; margin-bottom: 8px; }
  .search-result:active { background: var(--surface2); }
  .result-badge { font-size: 11px; font-weight: 700; color: var(--accent); min-width: 48px; flex-shrink: 0; }
  .result-text { flex: 1; font-size: 15px; min-width: 0; }
  .result-sub { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .result-thumb { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }

  #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; align-items: center; justify-content: center; }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 96vw; max-height: 88vh; border-radius: 10px; object-fit: contain; }
  #lightbox-close { position: absolute; top: calc(var(--safe-top) + 16px); right: 20px; background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 20px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  #toast { position: fixed; bottom: calc(var(--safe-bottom) + 24px); left: 50%; transform: translateX(-50%) translateY(20px); background: #222; color: var(--text); padding: 10px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; z-index: 200; white-space: nowrap; border: 1px solid var(--border); pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <button class="icon-btn" id="back-btn" style="display:none" onclick="navBack()">‹ Back</button>
    <span class="header-title" id="header-title">📦 Boxly</span>
    <div class="sync-dot" id="sync-dot"></div>
    <button class="icon-btn" id="search-icon-btn" onclick="navTo('search')">🔍</button>
  </div>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="stats">
      <div class="stat-card"><span class="stat-num" id="stat-boxes">0</span><span class="stat-label">Boxes</span></div>
      <div class="stat-card"><span class="stat-num" id="stat-items">0</span><span class="stat-label">Items</span></div>
    </div>
    <div class="box-list" id="box-list"><div class="empty">No boxes yet.</div></div>
    <button class="btn-primary" onclick="navTo('add-box')">+ New Box</button>
  </div>

  <!-- ADD BOX -->
  <div class="page" id="page-add-box">
    <p class="hint">Give this box a short label — e.g. "Kitchen", "Books", "Action Figures"</p>
    <input class="input" id="new-box-label" placeholder="Box label..." onkeydown="if(event.key==='Enter')createBox()">
    <button class="btn-primary" onclick="createBox()">Create Box</button>
  </div>

  <!-- BOX DETAIL -->
  <div class="page" id="page-box">
    <div class="photo-section">
      <span class="photo-section-label">Box Photos</span>
      <div class="photo-grid photo-sm" id="box-photos-grid"></div>
      <div class="photo-btns">
        <button class="btn-photo" onclick="triggerInput('box-cam')">📷 Camera</button>
        <button class="btn-photo" onclick="triggerInput('box-lib')">🖼 Library</button>
      </div>
      <input class="photo-input-hidden" type="file" id="box-cam" accept="image/*" capture="environment" onchange="handleBoxPhoto(this)">
      <input class="photo-input-hidden" type="file" id="box-lib" accept="image/*" onchange="handleBoxPhoto(this)">
    </div>
    <div class="divider"></div>
    <div class="input-row">
      <input class="input" id="new-group-text" placeholder='Add item or group, e.g. "Books"...' onkeydown="if(event.key==='Enter')addGroup()">
      <button class="btn-primary" style="width:auto;padding:13px 18px" onclick="addGroup()">Add</button>
    </div>
    <div class="group-list" id="group-list"><div class="empty">No items yet.</div></div>
    <button class="btn-danger" onclick="deleteCurrentBox()">Delete This Box</button>
  </div>

  <!-- GROUP DETAIL -->
  <div class="page" id="page-group">
    <div>
      <div class="field-label">Name</div>
      <input class="input" id="group-name-input" placeholder="Group name...">
    </div>
    <div>
      <div class="field-label">Notes</div>
      <textarea class="input" id="group-notes-input" placeholder="Add notes, description, condition..."></textarea>
    </div>
    <div class="photo-section">
      <span class="photo-section-label">Photos</span>
      <div class="photo-grid photo-md" id="group-photos-grid"></div>
      <div class="photo-btns">
        <button class="btn-photo" onclick="triggerInput('group-cam')">📷 Camera</button>
        <button class="btn-photo" onclick="triggerInput('group-lib')">🖼 Library</button>
      </div>
      <input class="photo-input-hidden" type="file" id="group-cam" accept="image/*" capture="environment" onchange="handleGroupPhoto(this)">
      <input class="photo-input-hidden" type="file" id="group-lib" accept="image/*" onchange="handleGroupPhoto(this)">
    </div>
    <div class="divider"></div>
    <div>
      <div class="field-label" style="margin-bottom:10px">Sub-items</div>
      <button class="btn-ai" id="ai-scan-btn" onclick="triggerInput('ai-scan-input')">
        <span>✦ Scan with AI</span>
      </button>
      <input class="photo-input-hidden" type="file" id="ai-scan-input" accept="image/*" onchange="handleAIScan(this)">
      <div class="subitem-list" id="subitem-list" style="margin-top:12px"></div>
      <div class="input-row" style="margin-top:10px">
        <input class="input" id="new-subitem-text" placeholder='Add sub-item manually...' onkeydown="if(event.key==='Enter')addSubitem()">
        <button class="btn-secondary" style="width:auto;padding:13px 16px" onclick="addSubitem()">Add</button>
      </div>
    </div>
    <div class="save-bar">
      <button class="btn-primary" onclick="saveGroup()">Save</button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="page" id="page-search">
    <input class="input" id="search-input" placeholder="Search items, notes, sub-items..." oninput="doSearch(this.value)">
    <div id="search-results"></div>
  </div>
</div>

<!-- AI RESULTS SHEET -->
<div id="ai-overlay">
  <div class="ai-sheet">
    <div class="ai-sheet-handle"></div>
    <div class="ai-sheet-header">
      <span class="ai-sheet-title">✦ AI found these items</span>
      <button class="ai-sheet-close" onclick="closeAISheet()">✕</button>
    </div>
    <div class="ai-sheet-body" id="ai-sheet-body"></div>
    <div class="ai-sheet-footer">
      <button class="btn-secondary" style="flex:1" onclick="closeAISheet()">Cancel</button>
      <button class="btn-primary" style="flex:2" onclick="confirmAIItems()">Add Selected</button>
    </div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="">
</div>
<div id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwC_KiAtO-WMq6WBj7Zcv9RywBsnVufLDOVn8JjZe7khTZxnf5CurqS8dteyMOgF1AE/exec";
const STORAGE_KEY = "boxly-v3";

// ── NAV STACK ────────────────────────────────────────────
// We maintain an explicit stack so back always goes to the right place
let navStack = ['home'];

function navTo(page) {
  navStack.push(page);
  renderPage(page);
}

function navBack() {
  if (navStack.length > 1) navStack.pop();
  const page = navStack[navStack.length - 1];
  renderPage(page);
}

function renderPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');

  const back = document.getElementById('back-btn');
  const title = document.getElementById('header-title');
  const searchBtn = document.getElementById('search-icon-btn');

  back.style.display = navStack.length > 1 ? '' : 'none';
  searchBtn.style.display = (page === 'home' || page === 'box') ? '' : 'none';

  if (page === 'home') {
    title.textContent = '📦 Boxly';
    renderHome();
  } else if (page === 'add-box') {
    title.textContent = 'New Box';
    setTimeout(() => document.getElementById('new-box-label').focus(), 100);
  } else if (page === 'box') {
    const b = getActiveBox();
    title.textContent = b ? `Box ${b.num} — ${b.label}` : 'Box';
    renderBoxDetail();
    setTimeout(() => document.getElementById('new-group-text').focus(), 100);
  } else if (page === 'group') {
    const b = getActiveBox();
    title.textContent = b ? `Box ${b.num}` : 'Item';
    renderGroupDetail();
  } else if (page === 'search') {
    title.textContent = 'Search';
    document.getElementById('search-input').value = '';
    document.getElementById('search-results').innerHTML = '';
    setTimeout(() => document.getElementById('search-input').focus(), 100);
  }
}

// ── STATE ────────────────────────────────────────────────
let state = { boxes: [], activeBoxId: null, activeGroupId: null, aiPendingItems: [] };

function saveLocal() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.boxes)); } catch {} }
function loadLocal() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) state.boxes = JSON.parse(r); } catch {} }
function getActiveBox() { return state.boxes.find(b => b.id === state.activeBoxId) || null; }
function getActiveGroup() { const box = getActiveBox(); return box ? (box.groups.find(g => g.id === state.activeGroupId) || null) : null; }

// ── SYNC ─────────────────────────────────────────────────
function setSyncStatus(s) { document.getElementById('sync-dot').className = 'sync-dot ' + s; }

async function syncPost(payload) {
  setSyncStatus('syncing');
  try {
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    setSyncStatus('synced');
    setTimeout(() => setSyncStatus(''), 3000);
  } catch { setSyncStatus('error'); toast('Sync failed — saved locally'); }
}

async function loadFromSheet() {
  setSyncStatus('syncing');
  try {
    const res = await fetch(SCRIPT_URL + '?action=getAll');
    const data = await res.json();
    if (data.success && data.items && data.items.length > 0 && state.boxes.length === 0) {
      const boxMap = {};
      data.items.forEach(row => {
        const num = parseInt(row.boxNum);
        if (!boxMap[num]) {
          let bp = []; try { bp = JSON.parse(row.boxPhotos || '[]'); } catch {}
          boxMap[num] = { id: num, num, label: row.boxLabel, photos: bp, groups: [] };
        }
        if (row.itemId) {
          let photos = []; try { photos = JSON.parse(row.photoUrls || '[]'); } catch {}
          let subitems = []; try { subitems = JSON.parse(row.subitems || '[]'); } catch {}
          boxMap[num].groups.push({ id: row.itemId, name: row.itemText, notes: row.notes || '', photos, subitems });
        }
      });
      state.boxes = Object.values(boxMap).sort((a, b) => a.num - b.num);
      saveLocal();
    }
    setSyncStatus('synced');
    setTimeout(() => setSyncStatus(''), 3000);
  } catch { setSyncStatus('error'); }
  renderHome();
}

// ── TOAST ────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── HOME ─────────────────────────────────────────────────
function renderHome() {
  const totalItems = state.boxes.reduce((a, b) => a + b.groups.length, 0);
  document.getElementById('stat-boxes').textContent = state.boxes.length;
  document.getElementById('stat-items').textContent = totalItems;
  const list = document.getElementById('box-list');
  if (!state.boxes.length) { list.innerHTML = '<div class="empty">No boxes yet.</div>'; return; }
  list.innerHTML = state.boxes.slice().sort((a, b) => a.num - b.num).map(b => {
    const photos = b.photos || [];
    const strip = photos.length ? `<div class="box-photo-strip">${photos.map(u => `<img src="${esc(u)}" onclick="event.stopPropagation();openLightbox('${esc(u)}')" loading="lazy">`).join('')}</div>` : '';
    return `<div class="box-card" onclick="openBox(${b.id})">
      <div class="box-card-main">
        <span class="box-num">#${b.num}</span>
        <span class="box-label-text">${esc(b.label)}</span>
        <span class="box-meta">${b.groups.length} item${b.groups.length !== 1 ? 's' : ''}</span>
        <span class="chevron">›</span>
      </div>${strip}</div>`;
  }).join('');
}

function openBox(id) {
  state.activeBoxId = id;
  navTo('box');
}

// ── CREATE BOX ───────────────────────────────────────────
function createBox() {
  const label = document.getElementById('new-box-label').value.trim();
  if (!label) return;
  const num = state.boxes.length ? Math.max(...state.boxes.map(b => b.num)) + 1 : 1;
  const box = { id: Date.now(), num, label, photos: [], groups: [] };
  state.boxes.push(box);
  saveLocal();
  document.getElementById('new-box-label').value = '';
  state.activeBoxId = box.id;
  // Replace add-box in stack with box
  navStack[navStack.length - 1] = 'box';
  renderPage('box');
  toast(`Box ${num} created`);
  syncPost({ action: 'createBox', boxNum: num, boxLabel: label });
}

// ── BOX DETAIL ───────────────────────────────────────────
function renderBoxDetail() {
  const box = getActiveBox(); if (!box) return;
  document.getElementById('header-title').textContent = `Box ${box.num} — ${box.label}`;
  const bg = document.getElementById('box-photos-grid');
  bg.innerHTML = (box.photos || []).map((url, i) => `
    <div class="photo-wrap photo-sm">
      <img src="${esc(url)}" onclick="openLightbox('${esc(url)}')" loading="lazy">
      <div class="del-dot" onclick="deleteBoxPhoto(${i})">✕</div>
    </div>`).join('');
  const list = document.getElementById('group-list');
  if (!box.groups.length) { list.innerHTML = '<div class="empty">No items yet.</div>'; return; }
  list.innerHTML = box.groups.map(g => {
    const photos = g.photos || [];
    const subitems = g.subitems || [];
    const thumb = photos[0] ? `<img class="group-card-thumb" src="${esc(photos[0])}" loading="lazy">` : '';
    const parts = [
      subitems.length ? `${subitems.length} sub-item${subitems.length !== 1 ? 's' : ''}` : '',
      photos.length ? `${photos.length} photo${photos.length !== 1 ? 's' : ''}` : '',
      g.notes ? g.notes.substring(0, 50) + (g.notes.length > 50 ? '…' : '') : ''
    ].filter(Boolean);
    return `<div class="group-card">
      <div class="group-card-header" onclick="openGroup('${esc(g.id)}')">
        ${thumb}
        <div style="flex:1;min-width:0">
          <div class="group-card-name">${esc(g.name)}</div>
          ${parts.length ? `<div class="group-card-meta">${esc(parts.join(' · '))}</div>` : ''}
        </div>
        <span class="chevron">›</span>
        <button class="group-del-btn" onclick="event.stopPropagation();deleteGroup('${esc(g.id)}')">✕</button>
      </div></div>`;
  }).join('');
}

async function handleBoxPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const box = getActiveBox(); if (!box) return;
  toast('Uploading…');
  try {
    const b64 = await compressImage(file);
    const url = await uploadPhoto(b64, `box-${box.num}-${Date.now()}.jpg`);
    if (url) { if (!box.photos) box.photos = []; box.photos.push(url); saveLocal(); renderBoxDetail(); renderHome(); toast('Photo added'); }
  } catch { toast('Upload failed'); }
  input.value = '';
}

function deleteBoxPhoto(i) {
  const box = getActiveBox(); if (!box) return;
  box.photos.splice(i, 1); saveLocal(); renderBoxDetail(); renderHome();
  syncPost({ action: 'updateBoxPhotos', boxNum: box.num, boxPhotos: JSON.stringify(box.photos) });
}

function addGroup() {
  const name = document.getElementById('new-group-text').value.trim();
  if (!name) return;
  const box = getActiveBox(); if (!box) return;
  const group = { id: Date.now().toString(), name, notes: '', photos: [], subitems: [] };
  box.groups.push(group);
  saveLocal(); renderBoxDetail(); renderHome();
  document.getElementById('new-group-text').value = '';
  toast('Item added');
  syncPost({ action: 'addItem', boxNum: box.num, boxLabel: box.label, itemId: group.id, itemText: name, notes: '', photoUrls: '[]', subitems: '[]' });
}

// ── GROUP DETAIL ─────────────────────────────────────────

}

function renderGroupDetail() {

async function handleGroupPhoto(input) {

  const group = getActiveGroup(); if (!group) return;
  toast('Uploading…');
  try {
    const b64 = await compressImage(file);
    const url = await uploadPhoto(b64, `group-${group.id}-${Date.now()}.jpg`);

function deleteGroupPhoto(i) {
  const group = getActiveGroup(); if (!group) return;

// ── AI SCAN ──────────────────────────────────────────────
async function handleAIScan(input) {
  const file = input.files[0]; if (!file) return;
  const btn = document.getElementById('ai-scan-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="ai-spinner"></div><span>Scanning…</span>';
  try {
    const b64 = await compressImage(file, 1600);
    const group = getActiveGroup();
    const groupName = group ? group.name : 'items';
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'scanWithAI', imageBase64: b64, groupName })
    });
    const data = await res.json();
    if (!data.success || !data.items || !data.items.length) { toast('No items detected'); return; }
    state.aiPendingItems = data.items.map((name, i) => ({ name, selected: true, id: i }));
    renderAISheet();
    document.getElementById('ai-overlay').classList.add('open');
  } catch (e) {
    console.error(e);
    toast('AI scan failed');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>✦ Scan with AI</span>';
    input.value = '';
  }
}

function renderAISheet() {
  document.getElementById('ai-sheet-body').innerHTML = state.aiPendingItems.map((item, i) => `
    <div class="ai-item-row" onclick="toggleAIItem(${i})">
      <div class="ai-check ${item.selected ? 'checked' : ''}" id="ai-check-${i}">${item.selected ? '✓' : ''}</div>
      <span class="ai-item-name">${esc(item.name)}</span>
    </div>`).join('');
}

function toggleAIItem(i) {
  state.aiPendingItems[i].selected = !state.aiPendingItems[i].selected;
  const el = document.getElementById('ai-check-' + i);
  el.classList.toggle('checked', state.aiPendingItems[i].selected);
  el.textContent = state.aiPendingItems[i].selected ? '✓' : '';
}

function confirmAIItems() {
  const group = getActiveGroup(); if (!group) return;
  const selected = state.aiPendingItems.filter(i => i.selected);
  if (!selected.length) { toast('Nothing selected'); return; }
  selected.forEach(item => {
    group.subitems.push({ id: Date.now().toString() + Math.random(), name: item.name, photos: [] });
  });
  saveLocal(); renderSubitems(); closeAISheet();
  toast(`${selected.length} item${selected.length !== 1 ? 's' : ''} added`);
}

function closeAISheet() {
  document.getElementById('ai-overlay').classList.remove('open');
  state.aiPendingItems = [];
}

// ── SUB-ITEMS ────────────────────────────────────────────
function renderSubitems() {
  const group = getActiveGroup(); if (!group) return;
  const list = document.getElementById('subitem-list');
  if (!(group.subitems || []).length) { list.innerHTML = '<div class="empty" style="padding:16px 0">No sub-items yet. Scan with AI or add manually.</div>'; return; }
  list.innerHTML = group.subitems.map(si => {
    const photos = si.photos || [];
    const photosHtml = photos.map((url, pi) => `
      <div class="subitem-photo-wrap">
        <img src="${esc(url)}" onclick="openLightbox('${esc(url)}')" loading="lazy">
        <div class="del-dot" onclick="deleteSubitemPhoto('${esc(si.id)}',${pi})">✕</div>
      </div>`).join('');
    return `<div class="subitem-card">
      <div class="subitem-header">
        <span class="subitem-name">${esc(si.name)}</span>
        ${photos.length ? `<span class="subitem-photo-count">📷 ${photos.length}</span>` : ''}
        <button class="subitem-expand-btn" onclick="toggleSubitem('${esc(si.id)}')">⌄</button>
        <button class="subitem-del-btn" onclick="deleteSubitem('${esc(si.id)}')">✕</button>
      </div>
      <div class="subitem-body hidden" id="sib-${esc(si.id)}">
        <div class="subitem-photos">${photosHtml}</div>
        <div class="subitem-add-photo-btns">
          <button class="btn-photo-sm" onclick="triggerInput('si-cam-${esc(si.id)}')">📷 Camera</button>
          <button class="btn-photo-sm" onclick="triggerInput('si-lib-${esc(si.id)}')">🖼 Library</button>
        </div>
        <input class="photo-input-hidden" type="file" id="si-cam-${esc(si.id)}" accept="image/*" capture="environment" onchange="handleSubitemPhoto(this,'${esc(si.id)}')">
        <input class="photo-input-hidden" type="file" id="si-lib-${esc(si.id)}" accept="image/*" onchange="handleSubitemPhoto(this,'${esc(si.id)}')">
      </div></div>`;
  }).join('');
}

function toggleSubitem(siId) {
  const body = document.getElementById('sib-' + siId); if (!body) return;
  const hidden = body.classList.toggle('hidden');
  const btn = body.previousElementSibling.querySelector('.subitem-expand-btn');
  if (btn) btn.textContent = hidden ? '⌄' : '⌃';
}

function addSubitem() {
  const name = document.getElementById('new-subitem-text').value.trim(); if (!name) return;
  const group = getActiveGroup(); if (!group) return;
  if (!group.subitems) group.subitems = [];
  group.subitems.push({ id: Date.now().toString(), name, photos: [] });
  saveLocal(); renderSubitems();
  document.getElementById('new-subitem-text').value = '';
}

function deleteSubitem(siId) {
  const group = getActiveGroup(); if (!group) return;
  group.subitems = group.subitems.filter(s => s.id !== siId);
  saveLocal(); renderSubitems();
}

async function handleSubitemPhoto(input, siId) {
  const file = input.files[0]; if (!file) return;
  const group = getActiveGroup(); if (!group) return;
  const si = group.subitems.find(s => s.id === siId); if (!si) return;
  toast('Uploading…');
  try {
    const b64 = await compressImage(file);
    const url = await uploadPhoto(b64, `si-${siId}-${Date.now()}.jpg`);
    if (url) { if (!si.photos) si.photos = []; si.photos.push(url); saveLocal(); renderSubitems(); toast('Photo added'); }
  } catch { toast('Upload failed'); }
  input.value = '';
}

function deleteSubitemPhoto(siId, pi) {
  const group = getActiveGroup(); if (!group) return;
  const si = group.subitems.find(s => s.id === siId); if (!si) return;
  si.photos.splice(pi, 1); saveLocal(); renderSubitems();
}

function saveGroup() {
  const group = getActiveGroup(); if (!group) return;
  const box = getActiveBox();
  group.name = document.getElementById('group-name-input').value.trim() || group.name;
  group.notes = document.getElementById('group-notes-input').value.trim();
  saveLocal(); renderHome();
  syncPost({ action: 'updateItem', itemId: group.id, itemText: group.name, notes: group.notes, photoUrls: JSON.stringify(group.photos || []), subitems: JSON.stringify(group.subitems || []), boxNum: box ? box.num : 0, boxLabel: box ? box.label : '' });
  toast('Saved');
  navBack();
}

function deleteGroup(groupId) {
  const box = getActiveBox(); if (!box) return;
  if (!confirm('Remove this item?')) return;
  box.groups = box.groups.filter(g => g.id !== groupId);
  saveLocal(); renderBoxDetail(); renderHome();
  syncPost({ action: 'deleteItem', itemId: groupId });
}

function deleteCurrentBox() {
  const box = getActiveBox(); if (!box) return;
  if (!confirm(`Delete Box ${box.num} — ${box.label}?`)) return;
  state.boxes = state.boxes.filter(b => b.id !== state.activeBoxId);
  state.activeBoxId = null;
  saveLocal(); renderHome();
  navStack = ['home'];
  renderPage('home');
  syncPost({ action: 'deleteBox', boxNum: box.num });
  toast('Box deleted');
}

// ── SEARCH ───────────────────────────────────────────────
function doSearch(q) {
  const container = document.getElementById('search-results');
  q = q.trim().toLowerCase();
  if (!q) { container.innerHTML = ''; return; }
  const boxHits = [], groupHits = [], subitemHits = [];
  state.boxes.forEach(b => {
    if (b.label.toLowerCase().includes(q)) boxHits.push(b);
    (b.groups || []).forEach(g => {
      if (g.name.toLowerCase().includes(q) || (g.notes || '').toLowerCase().includes(q)) groupHits.push({ box: b, group: g });
      (g.subitems || []).forEach(si => { if (si.name.toLowerCase().includes(q)) subitemHits.push({ box: b, group: g, si }); });
    });
  });
  if (!boxHits.length && !groupHits.length && !subitemHits.length) { container.innerHTML = `<div class="empty">Nothing found for "${esc(q)}"</div>`; return; }
  let html = '';
  if (boxHits.length) { html += `<div class="section-label" style="margin-bottom:10px">Boxes</div>`; html += boxHits.map(b => `<button class="search-result" onclick="openBox(${b.id})"><span class="result-badge">Box ${b.num}</span><span class="result-text">${esc(b.label)}</span><span class="result-sub">${b.groups.length} items</span></button>`).join(''); }
  if (groupHits.length) { html += `<div class="section-label" style="margin:${boxHits.length ? '14px' : 0} 0 10px">Items</div>`; html += groupHits.map(({ box, group }) => { const t = group.photos && group.photos[0] ? `<img class="result-thumb" src="${esc(group.photos[0])}" loading="lazy">` : ''; return `<button class="search-result" onclick="openBox(${box.id})"><span class="result-badge">Box ${box.num}</span>${t}<span class="result-text">${esc(group.name)}</span><span class="result-sub">${esc(box.label)}</span></button>`; }).join(''); }
  if (subitemHits.length) { html += `<div class="section-label" style="margin:${(boxHits.length || groupHits.length) ? '14px' : 0} 0 10px">Sub-items</div>`; html += subitemHits.map(({ box, group, si }) => { const t = si.photos && si.photos[0] ? `<img class="result-thumb" src="${esc(si.photos[0])}" loading="lazy">` : ''; return `<button class="search-result" onclick="openBox(${box.id})"><span class="result-badge">Box ${box.num}</span>${t}<span class="result-text">${esc(si.name)}</span><span class="result-sub">${esc(group.name)}</span></button>`; }).join(''); }
  container.innerHTML = html;
}

// ── PHOTO UTILS ──────────────────────────────────────────
function compressImage(file, maxSize = 1200) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h && w > maxSize) { h = h * maxSize / w; w = maxSize; } else if (h > maxSize) { w = w * maxSize / h; h = maxSize; }
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', 0.82).split(',')[1]);
      };
      img.onerror = reject; img.src = e.target.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

async function uploadPhoto(b64, name) {
  const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'uploadPhoto', imageBase64: b64, fileName: name }) });
  const d = await res.json(); return d.success ? d.url : null;
}

function triggerInput(id) { document.getElementById(id).click(); }
function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
