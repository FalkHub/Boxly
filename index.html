<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boxly">
<title>Boxly</title>
<style>
/* ── RESET & TOKENS ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  /* Palette */
  --c-bg:        #0a0a0a;
  --c-s1:        #141414;
  --c-s2:        #1c1c1c;
  --c-s3:        #242424;
  --c-border:    #2a2a2a;
  --c-text:      #f2efe9;
  --c-text2:     #8a8a8a;
  --c-text3:     #555;
  --c-accent:    #c9a97a;
  --c-accent-bg: rgba(201,169,122,0.08);
  --c-danger:    #e05252;
  --c-ai:        #7c6aff;
  --c-ai-bg:     rgba(124,106,255,0.10);
  --c-ai-border: rgba(124,106,255,0.30);
  --c-green:     #4ade80;

  /* Radius */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;

  /* Safe areas */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);

  /* Transitions */
  --t-fast: 140ms ease;
}

html, body { width: 100%; overflow-x: hidden; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

#app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; }

/* ── HEADER ─────────────────────────────────────────── */
.hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: calc(var(--sat) + 12px) 16px 12px;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--c-border);
  position: sticky;
  top: 0;
  z-index: 50;
  min-height: 52px;
}
.hdr-back {
  display: none;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--c-accent);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  padding: 6px 8px 6px 0;
  white-space: nowrap;
  flex-shrink: 0;
}
.hdr-back svg { width: 9px; height: 15px; }
.hdr-title {
  flex: 1;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hdr-action {
  background: none;
  border: none;
  color: var(--c-text2);
  font-size: 20px;
  cursor: pointer;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--r-sm);
  flex-shrink: 0;
  transition: background var(--t-fast);
}
.hdr-action:active { background: var(--c-s2); }

/* Sync indicator */
.sync-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2px;
  background: var(--c-s2);
  color: var(--c-text3);
  border: 1px solid var(--c-border);
  transition: all 0.3s;
  flex-shrink: 0;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c-text3); transition: all 0.3s; }
.sync-pill.syncing { color: #f59e0b; border-color: rgba(245,158,11,0.3); }
.sync-pill.syncing .sync-dot { background: #f59e0b; animation: pulse 1s infinite; }
.sync-pill.synced { color: var(--c-green); border-color: rgba(74,222,128,0.3); }
.sync-pill.synced .sync-dot { background: var(--c-green); }
.sync-pill.error { color: var(--c-danger); border-color: rgba(224,82,82,0.3); }
.sync-pill.error .sync-dot { background: var(--c-danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── PAGES ──────────────────────────────────────────── */
.page { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; }
.page.active { display: block; }
.page-pad { padding: 20px 16px calc(var(--sab) + 40px); display: flex; flex-direction: column; gap: 20px; }

/* ── HOME PAGE ──────────────────────────────────────── */
.home-hero {
  background: linear-gradient(135deg, var(--c-s1) 0%, #1a160e 100%);
  border: 1px solid var(--c-border);
  border-radius: var(--r-xl);
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  overflow: hidden;
  position: relative;
}
.home-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(201,169,122,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.hero-stat { padding: 4px 16px 4px 0; }
.hero-stat + .hero-stat { padding-left: 16px; border-left: 1px solid var(--c-border); }
.hero-num { font-size: 40px; font-weight: 700; color: var(--c-accent); letter-spacing: -2px; line-height: 1; }
.hero-label { font-size: 11px; color: var(--c-text3); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px; font-weight: 600; }

.section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.section-title { font-size: 12px; font-weight: 700; color: var(--c-text3); text-transform: uppercase; letter-spacing: 0.8px; }

/* Box cards */
.box-list { display: flex; flex-direction: column; gap: 10px; }
.box-card {
  background: var(--c-s1);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  overflow: hidden;
  cursor: pointer;
  transition: border-color var(--t-fast);
  text-align: left;
  width: 100%;
  color: var(--c-text);
}
.box-card:active { border-color: var(--c-accent); background: var(--c-s2); }
.box-card-top { display: flex; align-items: center; gap: 12px; padding: 14px 16px; }
.box-num-badge {
  width: 36px; height: 36px;
  background: var(--c-accent-bg);
  border: 1px solid rgba(201,169,122,0.2);
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
  color: var(--c-accent);
  flex-shrink: 0;
}
.box-card-body { flex: 1; min-width: 0; }
.box-card-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.box-card-meta { font-size: 12px; color: var(--c-text2); margin-top: 2px; }
.box-card-arrow { color: var(--c-text3); font-size: 18px; }
.box-photo-row { display: flex; gap: 6px; padding: 0 16px 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.box-photo-row::-webkit-scrollbar { display: none; }
.box-photo-row img { width: 52px; height: 52px; border-radius: var(--r-sm); object-fit: cover; border: 1px solid var(--c-border); flex-shrink: 0; cursor: pointer; }

/* ── BUTTONS ────────────────────────────────────────── */
.btn {
  width: 100%;
  padding: 14px 20px;
  border: none;
  border-radius: var(--r-md);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: -0.2px;
  transition: opacity var(--t-fast);
}
.btn:active { opacity: 0.75; }
.btn:disabled { opacity: 0.35; pointer-events: none; }
.btn-accent { background: var(--c-accent); color: #0a0a0a; }
.btn-ghost { background: var(--c-s2); color: var(--c-text); border: 1px solid var(--c-border); }
.btn-danger-ghost { background: none; color: var(--c-danger); border: 1px solid rgba(224,82,82,0.25); }
.btn-ai {
  background: var(--c-ai-bg);
  color: var(--c-ai);
  border: 1px solid var(--c-ai-border);
  font-size: 14px;
  font-weight: 700;
}
.btn-sm { padding: 9px 14px; font-size: 13px; border-radius: var(--r-sm); }
.btn-inline { width: auto; padding: 12px 18px; }

.ai-spinner { width: 15px; height: 15px; border: 2px solid var(--c-ai-border); border-top-color: var(--c-ai); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── INPUTS ─────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 11px; font-weight: 700; color: var(--c-text3); text-transform: uppercase; letter-spacing: 0.6px; }
.input {
  background: var(--c-s1);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  padding: 13px 14px;
  font-size: 16px;
  color: var(--c-text);
  width: 100%;
  outline: none;
  -webkit-appearance: none;
  font-family: inherit;
  transition: border-color var(--t-fast);
}
.input:focus { border-color: rgba(201,169,122,0.5); }
.input::placeholder { color: var(--c-text3); }
textarea.input { resize: none; min-height: 84px; line-height: 1.5; }
.input-row { display: flex; gap: 8px; }
.input-row .input { flex: 1; }
.file-hidden { display: none; }

/* ── CARD SHELL ─────────────────────────────────────── */
.card {
  background: var(--c-s1);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.card-pad { padding: 14px 16px; }

/* ── PHOTO GRID ─────────────────────────────────────── */
.photo-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.photo-thumb-wrap { position: relative; }
.photo-thumb-wrap img { border-radius: var(--r-sm); object-fit: cover; border: 1px solid var(--c-border); display: block; cursor: pointer; }
.thumb-sm img { width: 64px; height: 64px; }
.thumb-md img { width: 80px; height: 80px; }
.photo-del {
  position: absolute; top: -5px; right: -5px;
  width: 20px; height: 20px;
  background: var(--c-danger);
  border: 2px solid var(--c-bg);
  border-radius: 50%;
  color: #fff;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.photo-add-btns { display: flex; gap: 8px; margin-top: 2px; }

/* ── GROUP CARDS ────────────────────────────────────── */
.group-list { display: flex; flex-direction: column; gap: 8px; }
.group-card {
  background: var(--c-s1);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.group-card-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  cursor: pointer;
}
.group-card-row:active { background: var(--c-s2); }
.group-thumb { width: 42px; height: 42px; border-radius: var(--r-sm); object-fit: cover; border: 1px solid var(--c-border); flex-shrink: 0; }
.group-no-thumb {
  width: 42px; height: 42px;
  border-radius: var(--r-sm);
  background: var(--c-s2);
  border: 1px solid var(--c-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.group-info { flex: 1; min-width: 0; }
.group-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.group-meta { font-size: 12px; color: var(--c-text2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.group-arrow { color: var(--c-text3); font-size: 18px; flex-shrink: 0; }
.group-del { background: none; border: none; color: var(--c-text3); font-size: 18px; cursor: pointer; padding: 4px 2px; flex-shrink: 0; }
.group-del:active { color: var(--c-danger); }

/* ── SUB-ITEMS ──────────────────────────────────────── */
.subitem-list { display: flex; flex-direction: column; gap: 6px; }
.subitem-card {
  background: var(--c-s2);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  overflow: hidden;
}
.subitem-row { display: flex; align-items: center; gap: 10px; padding: 11px 12px; }
.subitem-icon { font-size: 13px; color: var(--c-text3); flex-shrink: 0; }
.subitem-name { flex: 1; font-size: 14px; font-weight: 500; }
.subitem-photo-badge { font-size: 11px; color: var(--c-text3); background: var(--c-s3); border-radius: 20px; padding: 2px 7px; flex-shrink: 0; }
.subitem-expand { background: none; border: none; color: var(--c-text3); font-size: 15px; cursor: pointer; padding: 3px 6px; }
.subitem-del { background: none; border: none; color: var(--c-text3); font-size: 15px; cursor: pointer; padding: 3px 6px; }
.subitem-del:active { color: var(--c-danger); }
.subitem-body { border-top: 1px solid var(--c-border); padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.subitem-body.hidden { display: none; }
.subitem-photos { display: flex; gap: 6px; flex-wrap: wrap; }
.subitem-photo-wrap { position: relative; }
.subitem-photo-wrap img { width: 60px; height: 60px; border-radius: var(--r-sm); object-fit: cover; border: 1px solid var(--c-border); cursor: pointer; display: block; }
.subitem-photo-del { position: absolute; top: -5px; right: -5px; width: 18px; height: 18px; background: var(--c-danger); border: 2px solid var(--c-bg); border-radius: 50%; color: #fff; font-size: 9px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

/* ── DIVIDER ────────────────────────────────────────── */
.divider { height: 1px; background: var(--c-border); }

/* ── EMPTY STATE ────────────────────────────────────── */
.empty-state { text-align: center; padding: 32px 20px; color: var(--c-text3); }
.empty-state .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.5; }
.empty-state p { font-size: 14px; line-height: 1.5; }

/* ── STICKY SAVE ────────────────────────────────────── */
.sticky-footer {
  position: sticky;
  bottom: 0;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--c-border);
  padding: 12px 16px calc(var(--sab) + 12px);
}

/* ── AI BOTTOM SHEET ────────────────────────────────── */
#ai-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
#ai-overlay.open { display: flex; }
.ai-sheet {
  background: var(--c-s1);
  border: 1px solid var(--c-border);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  width: 100%;
  max-width: 430px;
  max-height: 75vh;
  display: flex;
  flex-direction: column;
  padding-bottom: calc(var(--sab) + 8px);
}
.ai-sheet-handle { width: 32px; height: 4px; background: var(--c-border); border-radius: 2px; margin: 10px auto; }
.ai-sheet-hdr { padding: 4px 16px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--c-border); }
.ai-sheet-title { font-size: 15px; font-weight: 700; color: var(--c-ai); display: flex; align-items: center; gap: 6px; }
.ai-sheet-close { background: none; border: none; color: var(--c-text3); font-size: 22px; cursor: pointer; padding: 4px; }
.ai-sheet-subtext { font-size: 12px; color: var(--c-text3); padding: 8px 16px 0; }
.ai-items { flex: 1; overflow-y: auto; padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; }
.ai-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--c-s2);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  padding: 11px 14px;
  cursor: pointer;
  transition: border-color var(--t-fast);
}
.ai-item.selected { border-color: rgba(124,106,255,0.4); background: var(--c-ai-bg); }
.ai-check {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 1.5px solid var(--c-border);
  background: var(--c-s1);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  transition: all var(--t-fast);
}
.ai-item.selected .ai-check { background: var(--c-ai); border-color: var(--c-ai); color: #fff; }
.ai-item-name { flex: 1; font-size: 14px; line-height: 1.3; }
.ai-sheet-footer { padding: 10px 16px 0; display: flex; gap: 8px; }

/* ── SEARCH RESULTS ─────────────────────────────────── */
.search-hit {
  display: flex; align-items: center; gap: 12px;
  background: var(--c-s1);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  padding: 12px 14px;
  cursor: pointer;
  margin-bottom: 8px;
  text-align: left;
  color: var(--c-text);
  width: 100%;
}
.search-hit:active { background: var(--c-s2); }
.hit-badge { font-size: 11px; font-weight: 700; color: var(--c-accent); min-width: 50px; flex-shrink: 0; }
.hit-thumb { width: 34px; height: 34px; border-radius: var(--r-sm); object-fit: cover; border: 1px solid var(--c-border); flex-shrink: 0; }
.hit-text { flex: 1; font-size: 14px; min-width: 0; }
.hit-sub { font-size: 12px; color: var(--c-text3); flex-shrink: 0; }

/* ── LIGHTBOX ───────────────────────────────────────── */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 300; align-items: center; justify-content: center; }
#lightbox.open { display: flex; }
#lightbox img { max-width: 96vw; max-height: 90vh; border-radius: var(--r-md); object-fit: contain; }
#lightbox-close { position: absolute; top: calc(var(--sat) + 16px); right: 16px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15); color: #fff; font-size: 18px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* ── TOAST ──────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: calc(var(--sab) + 28px);
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--c-s2);
  color: var(--c-text);
  padding: 9px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.2s ease;
  z-index: 400;
  white-space: nowrap;
  border: 1px solid var(--c-border);
  pointer-events: none;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="hdr">
    <button class="hdr-back" id="hdr-back" onclick="navBack()">
      <svg viewBox="0 0 9 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 1L1.5 7.5L8 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </button>
    <span class="hdr-title" id="hdr-title">📦 Boxly</span>
    <div class="sync-pill" id="sync-pill"><div class="sync-dot"></div><span id="sync-label">Sync</span></div>
    <button class="hdr-action" id="hdr-search" onclick="navTo('search')" title="Search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
  </header>

  <!-- ── HOME ── -->
  <div class="page active" id="page-home">
    <div class="page-pad">
      <div class="home-hero">
        <div class="hero-stat">
          <div class="hero-num" id="stat-boxes">0</div>
          <div class="hero-label">Boxes</div>
        </div>
        <div class="hero-stat">
          <div class="hero-num" id="stat-items">0</div>
          <div class="hero-label">Items</div>
        </div>
      </div>

      <div>
        <div class="section-hdr">
          <span class="section-title">Your Boxes</span>
        </div>
        <div class="box-list" id="box-list">
          <div class="empty-state"><div class="empty-icon">📦</div><p>No boxes yet.<br>Tap below to get started.</p></div>
        </div>
      </div>

      <button class="btn btn-accent" onclick="navTo('add-box')">+ New Box</button>
    </div>
  </div>

  <!-- ── ADD BOX ── -->
  <div class="page" id="page-add-box">
    <div class="page-pad">
      <div class="field">
        <label class="field-label">Box Label</label>
        <input class="input" id="new-box-label" placeholder='e.g. "Kitchen", "Books", "Bedroom"' onkeydown="if(event.key==='Enter')createBox()">
      </div>
      <button class="btn btn-accent" onclick="createBox()">Create Box</button>
    </div>
  </div>

  <!-- ── BOX DETAIL ── -->
  <div class="page" id="page-box">
    <div class="page-pad">

      <!-- Box photos -->
      <div class="card">
        <div class="card-pad" style="display:flex;flex-direction:column;gap:10px">
          <span class="field-label">Box Photos</span>
          <div class="photo-grid thumb-sm" id="box-photos-grid"></div>
          <div class="photo-add-btns">
            <button class="btn btn-ghost btn-sm" style="flex:1" onclick="tap('box-cam')">📷 Camera</button>
            <button class="btn btn-ghost btn-sm" style="flex:1" onclick="tap('box-lib')">🖼 Library</button>
          </div>
        </div>
        <input class="file-hidden" type="file" id="box-cam" accept="image/*" capture="environment" onchange="handleBoxPhoto(this)">
        <input class="file-hidden" type="file" id="box-lib" accept="image/*" onchange="handleBoxPhoto(this)">
      </div>

      <!-- Items -->
      <div>
        <div class="section-hdr"><span class="section-title">Items in this box</span></div>
        <div class="group-list" id="group-list">
          <div class="empty-state"><div class="empty-icon">🗂️</div><p>No items yet.<br>Add your first item below.</p></div>
        </div>
      </div>

      <!-- Add item -->
      <div class="card card-pad" style="display:flex;flex-direction:column;gap:10px">
        <div class="input-row">
          <input class="input" id="new-group-text" placeholder='Item or group name, e.g. "Books"' onkeydown="if(event.key==='Enter')addGroup()">
          <button class="btn btn-accent btn-inline" onclick="addGroup()">Add</button>
        </div>
      </div>

      <button class="btn btn-danger-ghost" onclick="deleteCurrentBox()">Delete This Box</button>
    </div>
  </div>

  <!-- ── GROUP DETAIL ── -->
  <div class="page" id="page-group">
    <div class="page-pad">

      <!-- Name + notes -->
      <div class="field">
        <label class="field-label">Name</label>
        <input class="input" id="group-name-input" placeholder="Item or group name">
      </div>
      <div class="field">
        <label class="field-label">Notes</label>
        <textarea class="input" id="group-notes-input" placeholder="Condition, description, serial number…"></textarea>
      </div>

      <!-- Group photos -->
      <div class="card">
        <div class="card-pad" style="display:flex;flex-direction:column;gap:10px">
          <span class="field-label">Photos</span>
          <div class="photo-grid thumb-md" id="group-photos-grid"></div>
          <div class="photo-add-btns">
            <button class="btn btn-ghost btn-sm" style="flex:1" onclick="tap('grp-cam')">📷 Camera</button>
            <button class="btn btn-ghost btn-sm" style="flex:1" onclick="tap('grp-lib')">🖼 Library</button>
          </div>
        </div>
        <input class="file-hidden" type="file" id="grp-cam" accept="image/*" capture="environment" onchange="handleGroupPhoto(this)">
        <input class="file-hidden" type="file" id="grp-lib" accept="image/*" onchange="handleGroupPhoto(this)">
      </div>

      <div class="divider"></div>

      <!-- Sub-items -->
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="section-hdr" style="margin-bottom:0"><span class="section-title">Sub-items</span></div>

        <!-- AI SCAN — prominent -->
        <button class="btn btn-ai" id="ai-scan-btn" onclick="tap('ai-input')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          Scan with AI — Photo to Items
        </button>
        <input class="file-hidden" type="file" id="ai-input" accept="image/*" onchange="handleAIScan(this)">

        <div class="subitem-list" id="subitem-list"></div>

        <div class="input-row">
          <input class="input" id="new-subitem-text" placeholder="Add sub-item manually…" onkeydown="if(event.key==='Enter')addSubitem()">
          <button class="btn btn-ghost btn-inline" onclick="addSubitem()">Add</button>
        </div>
      </div>
    </div>

    <div class="sticky-footer">
      <button class="btn btn-accent" onclick="saveGroup()">Save Changes</button>
    </div>
  </div>

  <!-- ── SEARCH ── -->
  <div class="page" id="page-search">
    <div class="page-pad">
      <input class="input" id="search-input" placeholder="Search boxes, items, sub-items…" oninput="doSearch(this.value)">
      <div id="search-results"></div>
    </div>
  </div>

</div><!-- /app -->

<!-- AI SHEET -->
<div id="ai-overlay" onclick="if(event.target===this)closeAI()">
  <div class="ai-sheet">
    <div class="ai-sheet-handle"></div>
    <div class="ai-sheet-hdr">
      <span class="ai-sheet-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        AI identified these items
      </span>
      <button class="ai-sheet-close" onclick="closeAI()">✕</button>
    </div>
    <p class="ai-sheet-subtext">Tap to deselect anything that looks wrong.</p>
    <div class="ai-items" id="ai-items"></div>
    <div class="ai-sheet-footer">
      <button class="btn btn-ghost" style="flex:1" onclick="closeAI()">Cancel</button>
      <button class="btn btn-accent" style="flex:2" onclick="confirmAI()">Add Selected</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwC_KiAtO-WMq6WBj7Zcv9RywBsnVufLDOVn8JjZe7khTZxnf5CurqS8dteyMOgF1AE/exec";
const LOCAL_KEY  = "boxly-v3";

// ── STATE ────────────────────────────────────────────────
let S = {
  boxes:         [],
  activeBoxId:   null,
  activeGroupId: null,
  aiItems:       [],
};
let navStack = ['home'];

// ── LOCAL STORAGE ────────────────────────────────────────
function save()  { try { localStorage.setItem(LOCAL_KEY, JSON.stringify(S.boxes)); } catch {} }
function load()  { try { const r = localStorage.getItem(LOCAL_KEY); if (r) S.boxes = JSON.parse(r); } catch {} }
function box()   { return S.boxes.find(b => b.id === S.activeBoxId) || null; }
function group() { const b = box(); return b ? (b.groups.find(g => g.id === S.activeGroupId) || null) : null; }

// ── SYNC ─────────────────────────────────────────────────
function syncStatus(state, label) {
  const pill  = document.getElementById('sync-pill');
  const lbl   = document.getElementById('sync-label');
  pill.className = 'sync-pill ' + (state || '');
  lbl.textContent = label || 'Sync';
}
async function push(payload) {
  syncStatus('syncing', 'Saving…');
  try {
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    syncStatus('synced', 'Saved');
    setTimeout(() => syncStatus('', 'Sync'), 2500);
  } catch { syncStatus('error', 'Offline'); }
}
async function pullSheet() {
  syncStatus('syncing', 'Loading…');
  try {
    const r    = await fetch(SCRIPT_URL + '?action=getAll');
    const data = await r.json();
    if (data.success && data.items && data.items.length && !S.boxes.length) {
      const map = {};
      data.items.forEach(row => {
        const n = parseInt(row.boxNum);
        if (!map[n]) {
          let bp = []; try { bp = JSON.parse(row.boxPhotos||'[]'); } catch {}
          map[n] = { id: n, num: n, label: row.boxLabel, photos: bp, groups: [] };
        }
        if (row.itemId) {
          let ph = []; try { ph = JSON.parse(row.photoUrls||'[]'); } catch {}
          let si = []; try { si = JSON.parse(row.subitems||'[]');  } catch {}
          map[n].groups.push({ id: row.itemId, name: row.itemText, notes: row.notes||'', photos: ph, subitems: si });
        }
      });
      S.boxes = Object.values(map).sort((a,b) => a.num - b.num);
      save();
    }
    syncStatus('synced', 'Saved');
    setTimeout(() => syncStatus('', 'Sync'), 2500);
  } catch { syncStatus('error', 'Offline'); }
  renderHome();
}

// ── NAVIGATION ───────────────────────────────────────────
function navTo(page) { navStack.push(page); render(page); }
function navBack()   { if (navStack.length > 1) navStack.pop(); render(navStack[navStack.length-1]); }

function render(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');

  const back   = document.getElementById('hdr-back');
  const title  = document.getElementById('hdr-title');
  const search = document.getElementById('hdr-search');

  back.style.display  = navStack.length > 1 ? 'flex' : 'none';
  search.style.display = ['home','box'].includes(page) ? 'flex' : 'none';

  if (page === 'home')     { title.textContent = '📦 Boxly'; renderHome(); }
  if (page === 'add-box')  { title.textContent = 'New Box'; setTimeout(() => document.getElementById('new-box-label').focus(), 80); }
  if (page === 'box')      { const b = box(); title.textContent = b ? `Box ${b.num}` : 'Box'; renderBox(); setTimeout(() => document.getElementById('new-group-text').focus(), 80); }
  if (page === 'group')    { const b = box(); title.textContent = b ? `Box ${b.num} — Items` : 'Item'; renderGroup(); }
  if (page === 'search')   { title.textContent = 'Search'; document.getElementById('search-input').value = ''; document.getElementById('search-results').innerHTML = ''; setTimeout(() => document.getElementById('search-input').focus(), 80); }
}

// ── HOME ─────────────────────────────────────────────────
function renderHome() {
  const total = S.boxes.reduce((a,b) => a + b.groups.length, 0);
  document.getElementById('stat-boxes').textContent = S.boxes.length;
  document.getElementById('stat-items').textContent = total;
  const el = document.getElementById('box-list');
  if (!S.boxes.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><p>No boxes yet.<br>Tap below to get started.</p></div>'; return; }
  el.innerHTML = S.boxes.slice().sort((a,b) => a.num-b.num).map(b => {
    const strip = (b.photos||[]).length
      ? `<div class="box-photo-row">${(b.photos||[]).map(u=>`<img src="${x(u)}" onclick="event.stopPropagation();lb('${x(u)}')" loading="lazy">`).join('')}</div>`
      : '';
    return `<button class="box-card" onclick="openBox(${b.id})">
      <div class="box-card-top">
        <div class="box-num-badge">${b.num}</div>
        <div class="box-card-body">
          <div class="box-card-name">${x(b.label)}</div>
          <div class="box-card-meta">${b.groups.length} item${b.groups.length!==1?'s':''}</div>
        </div>
        <span class="box-card-arrow">›</span>
      </div>${strip}
    </button>`;
  }).join('');
}

function openBox(id) { S.activeBoxId = id; navTo('box'); }

// ── CREATE BOX ───────────────────────────────────────────
function createBox() {
  const label = document.getElementById('new-box-label').value.trim();
  if (!label) return;
  const num = S.boxes.length ? Math.max(...S.boxes.map(b=>b.num)) + 1 : 1;
  const b = { id: Date.now(), num, label, photos: [], groups: [] };
  S.boxes.push(b); save();
  document.getElementById('new-box-label').value = '';
  S.activeBoxId = b.id;
  navStack[navStack.length-1] = 'box';
  render('box');
  toast(`Box ${num} created ✓`);
  push({ action:'createBox', boxNum:num, boxLabel:label });
}

// ── BOX DETAIL ───────────────────────────────────────────
function renderBox() {
  const b = box(); if (!b) return;
  document.getElementById('hdr-title').textContent = `Box ${b.num} — ${b.label}`;
  // Photos
  document.getElementById('box-photos-grid').innerHTML = (b.photos||[]).map((u,i) =>
    `<div class="photo-thumb-wrap thumb-sm"><img src="${x(u)}" onclick="lb('${x(u)}')" loading="lazy"><div class="photo-del" onclick="delBoxPhoto(${i})">✕</div></div>`
  ).join('');
  // Groups
  const el = document.getElementById('group-list');
  if (!b.groups.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🗂️</div><p>No items yet.</p></div>'; return; }
  el.innerHTML = b.groups.map(g => {
    const ph = g.photos||[], si = g.subitems||[];
    const thumb = ph[0]
      ? `<img class="group-thumb" src="${x(ph[0])}" loading="lazy">`
      : `<div class="group-no-thumb">📦</div>`;
    const meta = [
      si.length ? `${si.length} sub-item${si.length!==1?'s':''}` : '',
      ph.length ? `${ph.length} photo${ph.length!==1?'s':''}` : '',
      g.notes   ? g.notes.substring(0,48)+(g.notes.length>48?'…':'') : ''
    ].filter(Boolean).join('  ·  ');
    return `<div class="group-card">
      <div class="group-card-row" onclick="openGroup('${x(g.id)}')">
        ${thumb}
        <div class="group-info">
          <div class="group-name">${x(g.name)}</div>
          ${meta ? `<div class="group-meta">${x(meta)}</div>` : ''}
        </div>
        <span class="group-arrow">›</span>
        <button class="group-del" onclick="event.stopPropagation();delGroup('${x(g.id)}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function handleBoxPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const b = box(); if (!b) return;
  toast('Uploading…');
  try {
    const url = await upload(await compress(file), `box-${b.num}-${Date.now()}.jpg`);
    if (url) { if(!b.photos) b.photos=[]; b.photos.push(url); save(); renderBox(); renderHome(); toast('Photo added ✓'); }
  } catch { toast('Upload failed'); }
  input.value = '';
}
function delBoxPhoto(i) {
  const b = box(); if (!b) return;
  b.photos.splice(i,1); save(); renderBox(); renderHome();
  push({ action:'updateBoxPhotos', boxNum:b.num, boxPhotos:JSON.stringify(b.photos) });
}
function addGroup() {
  const name = document.getElementById('new-group-text').value.trim(); if (!name) return;
  const b = box(); if (!b) return;
  const g = { id: Date.now().toString(), name, notes:'', photos:[], subitems:[] };
  b.groups.push(g); save(); renderBox(); renderHome();
  document.getElementById('new-group-text').value = '';
  toast('Item added ✓');
  push({ action:'addItem', boxNum:b.num, boxLabel:b.label, itemId:g.id, itemText:name, notes:'', photoUrls:'[]', subitems:'[]' });
}
function delGroup(id) {
  const b = box(); if (!b) return;
  if (!confirm('Remove this item?')) return;
  b.groups = b.groups.filter(g => g.id !== id); save(); renderBox(); renderHome();
  push({ action:'deleteItem', itemId:id });
}
function deleteCurrentBox() {
  const b = box(); if (!b) return;
  if (!confirm(`Delete Box ${b.num} — ${b.label}? This cannot be undone.`)) return;
  S.boxes = S.boxes.filter(bx => bx.id !== S.activeBoxId);
  S.activeBoxId = null; save(); renderHome();
  navStack = ['home']; render('home');
  push({ action:'deleteBox', boxNum:b.num });
  toast('Box deleted');
}

// ── GROUP DETAIL ─────────────────────────────────────────
function openGroup(id) { S.activeGroupId = id; navTo('group'); }
function renderGroup() {
  const g = group(); if (!g) return;
  document.getElementById('group-name-input').value  = g.name;
  document.getElementById('group-notes-input').value = g.notes||'';
  document.getElementById('group-photos-grid').innerHTML = (g.photos||[]).map((u,i) =>
    `<div class="photo-thumb-wrap thumb-md"><img src="${x(u)}" onclick="lb('${x(u)}')" loading="lazy"><div class="photo-del" onclick="delGroupPhoto(${i})">✕</div></div>`
  ).join('');
  renderSubitems();
}
async function handleGroupPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const g = group(); if (!g) return;
  toast('Uploading…');
  try {
    const url = await upload(await compress(file), `grp-${g.id}-${Date.now()}.jpg`);
    if (url) { if(!g.photos) g.photos=[]; g.photos.push(url); save(); renderGroup(); toast('Photo added ✓'); }
  } catch { toast('Upload failed'); }
  input.value = '';
}
function delGroupPhoto(i) { const g = group(); if (!g) return; g.photos.splice(i,1); save(); renderGroup(); }

function saveGroup() {
  const g = group(); if (!g) return;
  const b = box();
  g.name  = document.getElementById('group-name-input').value.trim()  || g.name;
  g.notes = document.getElementById('group-notes-input').value.trim();
  save(); renderHome();
  push({ action:'updateItem', itemId:g.id, itemText:g.name, notes:g.notes, photoUrls:JSON.stringify(g.photos||[]), subitems:JSON.stringify(g.subitems||[]), boxNum:b?b.num:0, boxLabel:b?b.label:'' });
  toast('Saved ✓');
  navBack();
}

// ── AI SCAN ──────────────────────────────────────────────
async function handleAIScan(input) {
  const file = input.files[0]; if (!file) return;
  const btn = document.getElementById('ai-scan-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="ai-spinner"></div> Scanning with AI…';
  try {
    const b64 = await compress(file, 1600);
    const g   = group();
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action:'scanWithAI', imageBase64:b64, groupName: g ? g.name : 'items' })
    });
    const data = await res.json();
    if (!data.success || !data.items || !data.items.length) { toast('No items detected — try a clearer photo'); return; }
    S.aiItems = data.items.map((name,i) => ({ name, sel:true, id:i }));
    renderAISheet();
    document.getElementById('ai-overlay').classList.add('open');
  } catch(e) {
    console.error(e);
    toast('AI scan failed — check connection');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> Scan with AI — Photo to Items';
    input.value = '';
  }
}
function renderAISheet() {
  document.getElementById('ai-items').innerHTML = S.aiItems.map((item,i) =>
    `<div class="ai-item ${item.sel?'selected':''}" onclick="toggleAI(${i})">
      <div class="ai-check">${item.sel?'✓':''}</div>
      <span class="ai-item-name">${x(item.name)}</span>
    </div>`
  ).join('');
}
function toggleAI(i) {
  S.aiItems[i].sel = !S.aiItems[i].sel;
  const el = document.getElementById('ai-items').children[i];
  el.classList.toggle('selected', S.aiItems[i].sel);
  el.querySelector('.ai-check').textContent = S.aiItems[i].sel ? '✓' : '';
}
function confirmAI() {
  const g = group(); if (!g) return;
  const sel = S.aiItems.filter(i => i.sel);
  if (!sel.length) { toast('Nothing selected'); return; }
  sel.forEach(item => g.subitems.push({ id: Date.now().toString()+Math.random(), name:item.name, photos:[] }));
  save(); renderSubitems(); closeAI();
  toast(`${sel.length} item${sel.length!==1?'s':''} added ✓`);
}
function closeAI() { document.getElementById('ai-overlay').classList.remove('open'); S.aiItems = []; }

// ── SUB-ITEMS ────────────────────────────────────────────
function renderSubitems() {
  const g = group(); if (!g) return;
  const el = document.getElementById('subitem-list');
  if (!(g.subitems||[]).length) {
    el.innerHTML = '<div class="empty-state" style="padding:16px 0"><p>No sub-items yet.<br>Scan with AI or add manually.</p></div>';
    return;
  }
  el.innerHTML = g.subitems.map(si => {
    const ph = si.photos||[];
    const photosHtml = ph.map((u,pi) =>
      `<div class="subitem-photo-wrap"><img src="${x(u)}" onclick="lb('${x(u)}')" loading="lazy"><div class="subitem-photo-del" onclick="delSIPhoto('${x(si.id)}',${pi})">✕</div></div>`
    ).join('');
    return `<div class="subitem-card">
      <div class="subitem-row">
        <span class="subitem-icon">—</span>
        <span class="subitem-name">${x(si.name)}</span>
        ${ph.length ? `<span class="subitem-photo-badge">📷 ${ph.length}</span>` : ''}
        <button class="subitem-expand" onclick="toggleSI('${x(si.id)}')">⌄</button>
        <button class="subitem-del"    onclick="delSI('${x(si.id)}')">✕</button>
      </div>
      <div class="subitem-body hidden" id="sib-${x(si.id)}">
        ${ph.length ? `<div class="subitem-photos">${photosHtml}</div>` : ''}
        <div class="photo-add-btns">
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="tap('sic-${x(si.id)}')">📷 Camera</button>
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="tap('sil-${x(si.id)}')">🖼 Library</button>
        </div>
        <input class="file-hidden" type="file" id="sic-${x(si.id)}" accept="image/*" capture="environment" onchange="handleSIPhoto(this,'${x(si.id)}')">
        <input class="file-hidden" type="file" id="sil-${x(si.id)}" accept="image/*" onchange="handleSIPhoto(this,'${x(si.id)}')">
      </div>
    </div>`;
  }).join('');
}
function toggleSI(id) {
  const b = document.getElementById('sib-'+id); if (!b) return;
  const hidden = b.classList.toggle('hidden');
  b.previousElementSibling.querySelector('.subitem-expand').textContent = hidden ? '⌄' : '⌃';
}
function addSubitem() {
  const name = document.getElementById('new-subitem-text').value.trim(); if (!name) return;
  const g = group(); if (!g) return;
  if (!g.subitems) g.subitems = [];
  g.subitems.push({ id: Date.now().toString(), name, photos:[] });
  save(); renderSubitems();
  document.getElementById('new-subitem-text').value = '';
}
function delSI(id) { const g = group(); if (!g) return; g.subitems = g.subitems.filter(s=>s.id!==id); save(); renderSubitems(); }
async function handleSIPhoto(input, id) {
  const file = input.files[0]; if (!file) return;
  const g = group(); if (!g) return;
  const si = g.subitems.find(s=>s.id===id); if (!si) return;
  toast('Uploading…');
  try {
    const url = await upload(await compress(file), `si-${id}-${Date.now()}.jpg`);
    if (url) { if(!si.photos) si.photos=[]; si.photos.push(url); save(); renderSubitems(); toast('Photo added ✓'); }
  } catch { toast('Upload failed'); }
  input.value = '';
}
function delSIPhoto(id,pi) { const g=group();if(!g)return;const si=g.subitems.find(s=>s.id===id);if(!si)return;si.photos.splice(pi,1);save();renderSubitems(); }

// ── SEARCH ───────────────────────────────────────────────
function doSearch(q) {
  const el = document.getElementById('search-results');
  q = q.trim().toLowerCase();
  if (!q) { el.innerHTML = ''; return; }
  const bHits=[], gHits=[], sHits=[];
  S.boxes.forEach(b => {
    if (b.label.toLowerCase().includes(q)) bHits.push(b);
    (b.groups||[]).forEach(g => {
      if (g.name.toLowerCase().includes(q)||(g.notes||'').toLowerCase().includes(q)) gHits.push({b,g});
      (g.subitems||[]).forEach(si => { if(si.name.toLowerCase().includes(q)) sHits.push({b,g,si}); });
    });
  });
  if (!bHits.length&&!gHits.length&&!sHits.length) { el.innerHTML=`<div class="empty-state"><p>Nothing found for "<strong>${x(q)}</strong>"</p></div>`; return; }
  let html='';
  const sec = (t,m) => `<div class="section-title" style="margin:${m} 0 10px">${t}</div>`;
  if (bHits.length) { html+=sec('Boxes','0'); html+=bHits.map(b=>`<button class="search-hit" onclick="openBox(${b.id})"><span class="hit-badge">Box ${b.num}</span><span class="hit-text">${x(b.label)}</span><span class="hit-sub">${b.groups.length} items</span></button>`).join(''); }
  if (gHits.length) { html+=sec('Items',bHits.length?'16px':'0'); html+=gHits.map(({b,g})=>{const t=g.photos&&g.photos[0]?`<img class="hit-thumb" src="${x(g.photos[0])}" loading="lazy">`:'';return`<button class="search-hit" onclick="openBox(${b.id})"><span class="hit-badge">Box ${b.num}</span>${t}<span class="hit-text">${x(g.name)}</span><span class="hit-sub">${x(b.label)}</span></button>`;}).join(''); }
  if (sHits.length) { html+=sec('Sub-items',(bHits.length||gHits.length)?'16px':'0'); html+=sHits.map(({b,g,si})=>{const t=si.photos&&si.photos[0]?`<img class="hit-thumb" src="${x(si.photos[0])}" loading="lazy">`:'';return`<button class="search-hit" onclick="openBox(${b.id})"><span class="hit-badge">Box ${b.num}</span>${t}<span class="hit-text">${x(si.name)}</span><span class="hit-sub">${x(g.name)}</span></button>`;}).join(''); }
  el.innerHTML = html;
}

// ── PHOTO UTILS ──────────────────────────────────────────
function compress(file, maxPx=1200) {
  return new Promise((res,rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w=img.width, h=img.height;
        if (w>h&&w>maxPx){h=h*maxPx/w;w=maxPx;} else if(h>maxPx){w=w*maxPx/h;h=maxPx;}
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',0.82).split(',')[1]);
      };
      img.onerror=rej; img.src=e.target.result;
    };
    reader.onerror=rej; reader.readAsDataURL(file);
  });
}
async function upload(b64, name) {
  const r = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({ action:'uploadPhoto', imageBase64:b64, fileName:name }) });
  const d = await r.json(); return d.success ? d.url : null;
}

// ── HELPERS ──────────────────────────────────────────────
function tap(id)   { document.getElementById(id).click(); }
function lb(src)   { document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function x(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

load();
renderHome();
pullSheet();
