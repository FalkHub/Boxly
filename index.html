<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boxly">
<title>Boxly</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0c0c0c; --surface: #161616; --surface2: #1e1e1e; --border: #242424;
    --text: #f0ede8; --muted: #555; --accent: #d4b896;
    --danger: #c0504d; --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { width: 100%; overflow-x: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overscroll-behavior: none; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  .header { display: flex; align-items: center; padding: calc(var(--safe-top) + 14px) 20px 14px; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; gap: 12px; min-height: 56px; }
  .header-title { flex: 1; font-size: 16px; font-weight: 600; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .icon-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; }
  .icon-btn:active { background: var(--surface); }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; flex-shrink: 0; }
  .sync-dot.syncing { background: #f0a500; animation: pulse 1s infinite; }
  .sync-dot.synced { background: #4caf50; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .page { display: none; flex: 1; padding: 20px 20px calc(var(--safe-bottom) + 32px); flex-direction: column; gap: 16px; overflow-y: auto; overflow-x: hidden; }
  .page.active { display: flex; }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stat-num { font-size: 32px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }

  .box-list { display: flex; flex-direction: column; gap: 8px; }
  .box-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; width: 100%; text-align: left; color: var(--text); cursor: pointer; }
  .box-card-main { display: flex; align-items: center; gap: 14px; padding: 14px 16px; }
  .box-card:active .box-card-main { background: var(--surface2); }
  .box-num { font-size: 12px; font-weight: 700; color: var(--accent); min-width: 42px; font-variant-numeric: tabular-nums; }
  .box-label-text { flex: 1; font-size: 15px; font-weight: 500; }
  .box-meta { font-size: 12px; color: var(--muted); }
  .chevron { color: var(--muted); font-size: 14px; }

  /* Box photo strip on home */
  .box-photo-strip { display: flex; gap: 6px; padding: 0 16px 12px; overflow-x: auto; }
  .box-photo-strip img { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; cursor: pointer; }

  .btn-primary { width: 100%; padding: 15px; background: var(--accent); color: #0c0c0c; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; }
  .btn-danger { width: 100%; padding: 13px; background: none; border: 1px solid #2a1a1a; border-radius: var(--radius); color: var(--danger); font-size: 14px; cursor: pointer; margin-top: 8px; }

  .input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; font-size: 16px; color: var(--text); width: 100%; outline: none; -webkit-appearance: none; }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--muted); }
  .input-row { display: flex; gap: 8px; }
  .input-row .input { flex: 1; }

  /* Photo add area */
  .photo-add-area { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
  .photo-add-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .photo-staged-strip { display: flex; gap: 8px; flex-wrap: wrap; }
  .photo-staged-wrap { position: relative; width: 64px; height: 64px; }
  .photo-staged-wrap img { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; display: block; }
  .photo-staged-del { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--danger); border: 2px solid var(--bg); color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .photo-btns { display: flex; gap: 8px; }
  .btn-photo { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; font-size: 13px; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .btn-photo:active { background: #2a2a2a; }
  .photo-input-hidden { display: none; }

  /* Section label */
  .section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 0; }
  .hint { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .divider { height: 1px; background: var(--border); }

  /* ITEM CARDS — clickable */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; width: 100%; text-align: left; color: var(--text); }
  .item-card:active { background: var(--surface2); }
  .item-card-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .item-card-thumb-count { width: 44px; height: 44px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); }
  .item-card-body { flex: 1; min-width: 0; }
  .item-card-name { font-size: 15px; font-weight: 500; }
  .item-card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-del-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; }
  .item-del-btn:active { color: var(--danger); }

  /* ITEM DETAIL PAGE */
  .item-detail-field { display: flex; flex-direction: column; gap: 6px; }
  .item-detail-field label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  textarea.input { resize: none; min-height: 90px; line-height: 1.5; }

  /* Photo gallery in item detail */
  .photo-gallery { display: flex; gap: 8px; flex-wrap: wrap; }
  .photo-gallery-wrap { position: relative; width: 80px; height: 80px; }
  .photo-gallery-wrap img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; display: block; }
  .photo-gallery-del { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 50%; background: var(--danger); border: 2px solid var(--bg); color: #fff; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

  /* Search */
  .search-result { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; text-align: left; color: var(--text); width: 100%; margin-bottom: 8px; }
  .search-result:active { background: var(--surface2); }
  .result-badge { font-size: 11px; font-weight: 700; color: var(--accent); min-width: 48px; flex-shrink: 0; }
  .result-text { flex: 1; font-size: 15px; min-width: 0; }
  .result-sub { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .result-thumb { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }

  /* Lightbox */
  #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; align-items: center; justify-content: center; }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 96vw; max-height: 88vh; border-radius: 10px; object-fit: contain; }
  #lightbox-close { position: absolute; top: calc(var(--safe-top) + 16px); right: 20px; background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 20px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  /* Toast */
  #toast { position: fixed; bottom: calc(var(--safe-bottom) + 24px); left: 50%; transform: translateX(-50%) translateY(20px); background: #222; color: var(--text); padding: 10px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; z-index: 200; white-space: nowrap; border: 1px solid var(--border); pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .save-bar { position: sticky; bottom: 0; background: var(--bg); padding: 12px 0 0; border-top: 1px solid var(--border); margin-top: auto; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <button class="icon-btn" id="back-btn" style="display:none" onclick="goBack()">←</button>
    <span class="header-title" id="header-title">📦 Boxly</span>
    <div class="sync-dot" id="sync-dot"></div>
    <button class="icon-btn" id="search-icon-btn" onclick="showPage('search')">🔍</button>
  </div>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="stats">
      <div class="stat-card"><span class="stat-num" id="stat-boxes">0</span><span class="stat-label">Boxes</span></div>
      <div class="stat-card"><span class="stat-num" id="stat-items">0</span><span class="stat-label">Items</span></div>
    </div>
    <div class="box-list" id="box-list"><div class="empty">No boxes yet.<br>Add your first one below.</div></div>
    <button class="btn-primary" onclick="showPage('add-box')">+ New Box</button>
  </div>

  <!-- ADD BOX -->
  <div class="page" id="page-add-box">
    <p class="hint">Give this box a short label — e.g. "Kitchen", "Books", "Cables & Tech"</p>
    <input class="input" id="new-box-label" placeholder="Box label..." onkeydown="if(event.key==='Enter')createBox()">
    <button class="btn-primary" onclick="createBox()">Create Box</button>
  </div>

  <!-- BOX DETAIL -->
  <div class="page" id="page-box">
    <!-- Box photos -->
    <div class="photo-add-area" id="box-photo-area">
      <span class="photo-add-label">Box Photos</span>
      <div class="photo-staged-strip" id="box-photos-strip"></div>
      <div class="photo-btns">
        <button class="btn-photo" onclick="triggerPhoto('box-camera')">📷 Camera</button>
        <button class="btn-photo" onclick="triggerPhoto('box-library')">🖼 Library</button>
      </div>
      <input class="photo-input-hidden" type="file" id="box-camera" accept="image/*" capture="environment" onchange="handleBoxPhoto(this)">
      <input class="photo-input-hidden" type="file" id="box-library" accept="image/*" onchange="handleBoxPhoto(this)">
    </div>

    <div class="divider"></div>

    <!-- Add item -->
    <div class="input-row">
      <input class="input" id="new-item-text" placeholder="Add item..." onkeydown="if(event.key==='Enter')addItem()">
      <button class="btn-primary" style="width:auto;padding:13px 18px" id="add-item-btn" onclick="addItem()">Add</button>
    </div>

    <div class="item-list" id="item-list"><div class="empty">No items yet.</div></div>
    <button class="btn-danger" onclick="deleteCurrentBox()">Delete This Box</button>
  </div>

  <!-- ITEM DETAIL -->
  <div class="page" id="page-item">
    <div class="item-detail-field">
      <label>Item Name</label>
      <input class="input" id="item-name-input" placeholder="Item name...">
    </div>
    <div class="item-detail-field">
      <label>Notes / Sub-details</label>
      <textarea class="input" id="item-notes-input" placeholder="Add notes, condition, serial number, etc..."></textarea>
    </div>

    <!-- Item photos -->
    <div class="item-detail-field">
      <label>Photos</label>
      <div class="photo-gallery" id="item-photo-gallery"></div>
      <div class="photo-btns" style="margin-top:8px">
        <button class="btn-photo" onclick="triggerPhoto('item-camera')">📷 Camera</button>
        <button class="btn-photo" onclick="triggerPhoto('item-library')">🖼 Library</button>
      </div>
      <input class="photo-input-hidden" type="file" id="item-camera" accept="image/*" capture="environment" onchange="handleItemPhoto(this)">
      <input class="photo-input-hidden" type="file" id="item-library" accept="image/*" onchange="handleItemPhoto(this)">
    </div>

    <div class="save-bar">
      <button class="btn-primary" onclick="saveItemDetail()">Save Changes</button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="page" id="page-search">
    <input class="input" id="search-input" placeholder="Search items or box names..." oninput="doSearch(this.value)">
    <div id="search-results"></div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="">
</div>
<div id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwC_KiAtO-WMq6WBj7Zcv9RywBsnVufLDOVn8JjZe7khTZxnf5CurqS8dteyMOgF1AE/exec";
const STORAGE_KEY = "boxly-v2";
let state = { boxes: [], activeBoxId: null, activeItemId: null, prevPage: 'home' };

// ── STORAGE ──────────────────────────────────────────────
function saveLocal() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.boxes)); } catch {} }
function loadLocal() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) state.boxes = JSON.parse(r); } catch {} }

// ── SYNC ─────────────────────────────────────────────────
function setSyncStatus(s) { document.getElementById('sync-dot').className = 'sync-dot ' + s; }
async function syncPost(payload) {
  setSyncStatus('syncing');
  try {
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    setSyncStatus('synced'); setTimeout(() => setSyncStatus(''), 3000);
  } catch { setSyncStatus('error'); toast('Sync failed — saved locally'); }
}
async function loadFromSheet() {
  setSyncStatus('syncing');
  try {
    const res = await fetch(SCRIPT_URL + '?action=getAll');
    const data = await res.json();
    if (data.success && data.items && data.items.length > 0) {
      const boxMap = {};
      data.items.forEach(row => {
        const num = parseInt(row.boxNum);
        if (!boxMap[num]) {
          let bphotos = [];
          try { bphotos = JSON.parse(row.boxPhotos || '[]'); } catch {}
          boxMap[num] = { id: num, num, label: row.boxLabel, photos: bphotos, items: [] };
        }
        if (row.itemId) {
          let photos = [];
          try { photos = JSON.parse(row.photoUrls || '[]'); } catch { if (row.photoUrl) photos = [row.photoUrl]; }
          boxMap[num].items.push({ id: row.itemId, text: row.itemText, notes: row.notes || '', photos });
        }
      });
      state.boxes = Object.values(boxMap).sort((a,b) => a.num - b.num);
      saveLocal();
    }
    setSyncStatus('synced'); setTimeout(() => setSyncStatus(''), 3000);
  } catch { setSyncStatus('error'); }
  renderHome();
}

// ── NAV ──────────────────────────────────────────────────
function showPage(name, prev) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (prev !== undefined) state.prevPage = prev;
  const back = document.getElementById('back-btn');
  const title = document.getElementById('header-title');
  const searchBtn = document.getElementById('search-icon-btn');

  if (name === 'home') {
    back.style.display='none'; searchBtn.style.display='';
    title.textContent='📦 Boxly';
  } else if (name === 'add-box') {
    back.style.display=''; searchBtn.style.display='none';
    title.textContent='New Box';
    setTimeout(()=>document.getElementById('new-box-label').focus(),100);
  } else if (name === 'box') {
    back.style.display=''; searchBtn.style.display='';
    const b = getActiveBox();
    title.textContent = b ? `Box ${b.num} — ${b.label}` : 'Box';
    renderBoxDetail();
    setTimeout(()=>document.getElementById('new-item-text').focus(),100);
  } else if (name === 'item') {
    back.style.display=''; searchBtn.style.display='none';
    renderItemDetail();
  } else if (name === 'search') {
    back.style.display=''; searchBtn.style.display='none';
    title.textContent='Search';
    document.getElementById('search-input').value='';
    document.getElementById('search-results').innerHTML='';
    setTimeout(()=>document.getElementById('search-input').focus(),100);
  }
}

function goBack() {
  if (state.prevPage === 'item') { showPage('box', 'home'); return; }
  showPage(state.prevPage || 'home');
}

function getActiveBox() { return state.boxes.find(b => b.id === state.activeBoxId); }
function getActiveItem() { const b = getActiveBox(); return b ? b.items.find(i => i.id === state.activeItemId) : null; }

// ── TOAST ────────────────────────────────────────────────
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }

// ── HOME ─────────────────────────────────────────────────
function renderHome() {
  document.getElementById('stat-boxes').textContent = state.boxes.length;
  document.getElementById('stat-items').textContent = state.boxes.reduce((a,b)=>a+b.items.length,0);
  const list = document.getElementById('box-list');
  if (!state.boxes.length) { list.innerHTML='<div class="empty">No boxes yet.<br>Add your first one below.</div>'; return; }
  list.innerHTML = state.boxes.slice().sort((a,b)=>a.num-b.num).map(b=>{
    const photos = b.photos || [];
    const strip = photos.length ? `<div class="box-photo-strip">${photos.map(u=>`<img src="${esc(u)}" onclick="event.stopPropagation();openLightbox('${esc(u)}')" loading="lazy">`).join('')}</div>` : '';
    return `
      <div class="box-card" onclick="openBox(${b.id})">
        <div class="box-card-main">
          <span class="box-num">#${b.num}</span>
          <span class="box-label-text">${esc(b.label)}</span>
          <span class="box-meta">${b.items.length} item${b.items.length!==1?'s':''}</span>
          <span class="chevron">›</span>
        </div>
        ${strip}
      </div>`;
  }).join('');
}
function openBox(id) { state.activeBoxId=id; showPage('box','home'); }

// ── CREATE BOX ───────────────────────────────────────────
function createBox() {
  const label = document.getElementById('new-box-label').value.trim();
  if (!label) return;
  const num = state.boxes.length ? Math.max(...state.boxes.map(b=>b.num))+1 : 1;
  const box = { id: Date.now(), num, label, photos: [], items: [] };
  state.boxes.push(box); saveLocal(); renderHome();
  document.getElementById('new-box-label').value = '';
  state.activeBoxId = box.id;
  showPage('box','home');
  toast(`Box ${num} created`);
  syncPost({ action:'createBox', boxNum:num, boxLabel:label });
}

// ── BOX DETAIL ───────────────────────────────────────────
function renderBoxDetail() {
  const box = getActiveBox(); if (!box) return;
  document.getElementById('header-title').textContent = `Box ${box.num} — ${box.label}`;

  // Box photos
  const strip = document.getElementById('box-photos-strip');
  const photos = box.photos || [];
  strip.innerHTML = photos.map((url,i)=>`
    <div class="photo-staged-wrap">
      <img src="${esc(url)}" onclick="openLightbox('${esc(url)}')" loading="lazy">
      <div class="photo-staged-del" onclick="deleteBoxPhoto(${i})">✕</div>
    </div>`).join('');

  // Items
  const list = document.getElementById('item-list');
  if (!box.items.length) { list.innerHTML='<div class="empty">No items yet.</div>'; return; }
  list.innerHTML = box.items.map(item => {
    const photos = item.photos || [];
    let thumbHtml = '';
    if (photos.length === 1) thumbHtml = `<img class="item-card-thumb" src="${esc(photos[0])}" loading="lazy">`;
    else if (photos.length > 1) thumbHtml = `<div class="item-card-thumb-count">📷 ${photos.length}</div>`;
    const sub = item.notes ? item.notes.substring(0,40)+(item.notes.length>40?'…':'') : (photos.length ? `${photos.length} photo${photos.length!==1?'s':''}` : '');
    return `
      <div style="display:flex;align-items:center;gap:8px">
        <button class="item-card" style="flex:1" onclick="openItem('${esc(item.id)}')">
          ${thumbHtml}
          <div class="item-card-body">
            <div class="item-card-name">${esc(item.text)}</div>
            ${sub ? `<div class="item-card-sub">${esc(sub)}</div>` : ''}
          </div>
          <span style="color:var(--muted);font-size:14px">›</span>
        </button>
        <button class="item-del-btn" onclick="deleteItem('${esc(item.id)}')">✕</button>
      </div>`;
  }).join('');
}

// ── BOX PHOTOS ───────────────────────────────────────────
function triggerPhoto(inputId) { document.getElementById(inputId).click(); }

async function handleBoxPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const base64 = await compressImage(file);
  const box = getActiveBox(); if (!box) return;
  if (!box.photos) box.photos = [];

  toast('Uploading photo…');
  try {
    const url = await uploadPhoto(base64, `box-${box.num}-${Date.now()}.jpg`);
    if (url) {
      box.photos.push(url);
      saveLocal(); renderBoxDetail(); renderHome();
      syncPost({ action:'updateBoxPhotos', boxNum:box.num, boxPhotos:JSON.stringify(box.photos) });
      toast('Photo added');
    }
  } catch { toast('Upload failed'); }
  input.value='';
}

function deleteBoxPhoto(index) {
  const box = getActiveBox(); if (!box) return;
  box.photos.splice(index,1);
  saveLocal(); renderBoxDetail(); renderHome();
  syncPost({ action:'updateBoxPhotos', boxNum:box.num, boxPhotos:JSON.stringify(box.photos) });
}

// ── ADD ITEM ─────────────────────────────────────────────
async function addItem() {
  const text = document.getElementById('new-item-text').value.trim();
  if (!text) return;
  const box = getActiveBox(); if (!box) return;
  const btn = document.getElementById('add-item-btn');
  btn.disabled=true; btn.textContent='…';
  const itemId = Date.now().toString();
  box.items.push({ id:itemId, text, notes:'', photos:[] });
  saveLocal(); renderBoxDetail(); renderHome();
  document.getElementById('new-item-text').value='';
  btn.disabled=false; btn.textContent='Add';
  toast('Item added');
  syncPost({ action:'addItem', boxNum:box.num, boxLabel:box.label, itemId, itemText:text, photoUrls:'[]', notes:'' });
}

// ── ITEM DETAIL ──────────────────────────────────────────
function openItem(itemId) {
  state.activeItemId = itemId;
  showPage('item','box');
}

function renderItemDetail() {
  const item = getActiveItem(); if (!item) return;
  const box = getActiveBox();
  document.getElementById('header-title').textContent = box ? `Box ${box.num}` : 'Item';
  document.getElementById('item-name-input').value = item.text;
  document.getElementById('item-notes-input').value = item.notes || '';

  const gallery = document.getElementById('item-photo-gallery');
  const photos = item.photos || [];
  gallery.innerHTML = photos.map((url,i)=>`
    <div class="photo-gallery-wrap">
      <img src="${esc(url)}" onclick="openLightbox('${esc(url)}')" loading="lazy">
      <div class="photo-gallery-del" onclick="deleteItemPhoto(${i})">✕</div>
    </div>`).join('');
}

async function handleItemPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const base64 = await compressImage(file);
  const item = getActiveItem(); if (!item) return;
  if (!item.photos) item.photos = [];
  toast('Uploading photo…');
  try {
    const url = await uploadPhoto(base64, `item-${item.id}-${Date.now()}.jpg`);
    if (url) {
      item.photos.push(url);
      saveLocal(); renderItemDetail();
      toast('Photo added');
    }
  } catch { toast('Upload failed'); }
  input.value='';
}

function deleteItemPhoto(index) {
  const item = getActiveItem(); if (!item) return;
  item.photos.splice(index,1);
  saveLocal(); renderItemDetail();
}

function saveItemDetail() {
  const item = getActiveItem(); if (!item) return;
  const box = getActiveBox();
  item.text = document.getElementById('item-name-input').value.trim() || item.text;
  item.notes = document.getElementById('item-notes-input').value.trim();
  saveLocal(); renderBoxDetail(); renderHome();
  toast('Saved');
  syncPost({ action:'updateItem', itemId:item.id, itemText:item.text, notes:item.notes, photoUrls:JSON.stringify(item.photos||[]), boxNum:box?box.num:0, boxLabel:box?box.label:'' });
  showPage('box','home');
}

// ── DELETE ITEM ──────────────────────────────────────────
function deleteItem(itemId) {
  const box = getActiveBox(); if (!box) return;
  if (!confirm('Remove this item?')) return;
  box.items = box.items.filter(i => i.id !== itemId);
  saveLocal(); renderBoxDetail(); renderHome();
  syncPost({ action:'deleteItem', itemId });
}

// ── DELETE BOX ───────────────────────────────────────────
function deleteCurrentBox() {
  const box = getActiveBox(); if (!box) return;
  if (!confirm(`Delete Box ${box.num} — ${box.label}?`)) return;
  state.boxes = state.boxes.filter(b => b.id !== state.activeBoxId);
  state.activeBoxId = null;
  saveLocal(); renderHome(); showPage('home');
  syncPost({ action:'deleteBox', boxNum:box.num });
  toast('Box deleted');
}

// ── SEARCH ───────────────────────────────────────────────
function doSearch(q) {
  const container = document.getElementById('search-results');
  q = q.trim().toLowerCase();
  if (!q) { container.innerHTML=''; return; }
  const itemHits=[], boxHits=[];
  state.boxes.forEach(b => {
    if (b.label.toLowerCase().includes(q)) boxHits.push(b);
    b.items.forEach(item => { if (item.text.toLowerCase().includes(q) || (item.notes||'').toLowerCase().includes(q)) itemHits.push({box:b,item}); });
  });
  if (!itemHits.length && !boxHits.length) { container.innerHTML=`<div class="empty">Nothing found for "${esc(q)}"</div>`; return; }
  let html='';
  if (boxHits.length) {
    html += `<div class="section-label" style="margin-bottom:10px">Boxes</div>`;
    html += boxHits.map(b=>`<button class="search-result" onclick="openBox(${b.id})"><span class="result-badge">Box ${b.num}</span><span class="result-text">${esc(b.label)}</span><span class="result-sub">${b.items.length} items</span></button>`).join('');
  }
  if (itemHits.length) {
    html += `<div class="section-label" style="margin:${boxHits.length?'16px':0} 0 10px">Items</div>`;
    html += itemHits.map(({box,item})=>{
      const thumb = item.photos&&item.photos[0] ? `<img class="result-thumb" src="${esc(item.photos[0])}" loading="lazy">` : '';
      return `<button class="search-result" onclick="openBox(${box.id})"><span class="result-badge">Box ${box.num}</span>${thumb}<span class="result-text">${esc(item.text)}</span><span class="result-sub">${esc(box.label)}</span></button>`;
    }).join('');
  }
  container.innerHTML = html;
}

// ── PHOTO UTILS ──────────────────────────────────────────
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX=1200; let w=img.width,h=img.height;
        if(w>h&&w>MAX){h=h*MAX/w;w=MAX;}else if(h>MAX){w=w*MAX/h;h=MAX;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.78).split(',')[1]);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadPhoto(base64, name) {
  const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({ action:'uploadPhoto', imageBase64:base64, fileName:name }) });
  const d = await res.json();
  return d.success ? d.url : null;
}

// ── LIGHTBOX ─────────────────────────────────────────────
function openLightbox(src) { document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ── UTILS ────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── INIT ─────────────────────────────────────────────────
loadLocal(); renderHome(); loadFromSheet();
</script>
